name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build & test
        run: ./mvnw -B verify

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        if: github.event_name != 'pull_request'
        id: tags
        run: |
          set -e
          tags=""
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="main-${GITHUB_SHA::7},latest"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tags="${GITHUB_REF#refs/tags/v}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build & push image (jib)
        if: github.event_name != 'pull_request'
        run: |
          ./mvnw -B -DskipTests \
            -Djib.to.image="${IMAGE}" \
            -Djib.to.tags="${{ steps.tags.outputs.tags }}" \
            jib:build

      - name: Build image to tar (PR smoke)
        if: github.event_name == 'pull_request'
        run: ./mvnw -B -DskipTests -Djib.to.image="${IMAGE}" jib:buildTar
